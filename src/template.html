<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDO List</title>
</head>

<body>
    <header>
        <img class="logo" src="icon.png" alt="Logo">
        <div class="name">Todo List</div>
        <button class="add-new-todo"><i class="fa-solid fa-circle-plus"></i> Add ToDo</button>
    </header>

    <div class="layout">
        <aside class="side-bar" role="navigation" aria-label="Main navigation">
            <div class="side-header">
                <img class="logo-sm" src="icon.png" alt="App logo">
                <div class="side-title">ToDo List</div>
            </div>

            <nav class="nav-buttons" aria-label="Primary actions">
                <button class="nav-btn home" data-filter="all">Home</button>
                <button class="nav-btn today" data-filter="today">Today</button>
                <button class="nav-btn week" data-filter="week">This week</button>
            </nav>

            <div class="projects" aria-labelledby="projects-heading">
                <div id="projects-heading" class="project-heading">Projects</div>
                <div class="project-list" role="list">
                    <button class="project-item" role="listitem">1st one</button>
                    <button class="project-item" role="listitem">john</button>
                    <button class="project-item" role="listitem">uni</button>
                </div>
            </div>
        </aside>
        <main class="content">
            <section class="main-list">
                <!-- Main app content (todo list) goes here -->
            </section>

            <!-- Modal popup for creating a new ToDo. Toggle visibility with JS by adding/removing the 'hidden' class. -->
            <div class="modal-overlay hidden" id="todoModal">
                <div class="todo-modal" role="dialog" aria-modal="true" aria-labelledby="todoModalTitle">
                    <h2 id="todoModalTitle">Create ToDo</h2>

                    <form class="todo-form" action="#">
                        <div class="input-control">
                        <label for="todo-title">Title*</label>
                        <input id="todo-title" name="title" type="text" />
                        <div class="error"></div>
                        </div>

                        <label for="todo-desc">Description</label>
                        <textarea id="todo-desc" name="description" rows="4"></textarea>

                        <label for="todo-due">Due date</label>
                        <input id="todo-due" name="dueDate" type="date" />

                        <label for="todo-priority">Priority</label>
                        <select id="todo-priority" name="priority">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                        </select>

                        <label for="todo-project">Project</label>
                        <input id="todo-project" name="project" type="text" placeholder="Project name (optional)" />

                        <div class="modal-actions">
                            <button type="button" class="btn cancel">Cancel</button>
                            <button type="submit" class="btn create">Create</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <footer>footer</footer>
</body>

</html>
